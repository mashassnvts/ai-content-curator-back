# Graphiti — граф знаний для AI Content Curator
# Запуск: docker compose -f Graphiti/docker-compose.graphiti.yml up -d
# API: http://localhost:8000
# Swagger: http://localhost:8000/docs
# Neo4j Browser: http://localhost:7474
#
# В .env сервера: GRAPHITI_URL=http://localhost:8000
# Также нужны: OPENAI_API_KEY (Graphiti по умолчанию использует OpenAI для LLM и эмбеддингов)

services:
  graphiti:
    image: zepai/graphiti:latest
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - PORT=8000
      - db_backend=neo4j
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthcheck')"]
      interval: 10s
      timeout: 5s
      retries: 3

  neo4j:
    image: neo4j:5.26.2
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}

volumes:
  neo4j_data:
